# Rate-Limit-Zonen
# api_read:  pro Token — Widget-Lesezugriffe bei Millionen Zugriffen/Tag
# api_write: pro IP   — Vote-Submits, streng gegen Flooding
# api_auth:  pro IP   — Login, streng gegen Brute-Force
limit_req_zone $http_authorization   zone=api_read:20m  rate=300r/m;
limit_req_zone $binary_remote_addr   zone=api_write:10m rate=10r/m;
limit_req_zone $binary_remote_addr   zone=api_auth:10m  rate=5r/m;

# Nginx-Cache für GET /items/*
# 10s TTL: bei 1.000 gleichzeitigen Lesern trifft Directus nur 1 Request alle 10s
proxy_cache_path /tmp/nginx_cache
    levels=1:2
    keys_zone=items_cache:10m
    max_size=200m
    inactive=60s
    use_temp_path=off;

# CORS: dynamische Origin-Validierung
map $http_origin $cors_origin {
    default "";
    "~^https://(www\.)?rnd\.de$"    $http_origin;
    "~^https://[^/]+\.rnd\.de$"     $http_origin;
    "~^http://localhost(:[0-9]+)?$"  $http_origin;
}

server {
    listen 80;
    server_name _;

    # Sicherheits-Header
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://rnd.de https://*.rnd.de" always;

    # CORS
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Cache-Status im Header sichtbar (HIT / MISS / BYPASS)
    add_header X-Cache-Status $upstream_cache_status always;

    # Stack-Info verstecken
    # Directus-eigene CORS-Header unterdrücken — Nginx setzt sie korrekt
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;

    # Gemeinsame Proxy-Header
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout    300;
    proxy_connect_timeout 300;

    # Auth-Endpunkte: Brute-Force-Schutz
    location ~ ^/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://directus:8055;
    }

    # Items GET: gecacht, Rate-Limit pro Token
    location ~ ^/items/ {
        # Directus setzt Cache-Control: private — für Proxy-Caching überschreiben
        proxy_ignore_headers     Cache-Control Expires;

        # Nur GET/HEAD cachen — POST geht direkt durch
        proxy_cache              items_cache;
        proxy_cache_key          "$request_method$request_uri$http_authorization";
        proxy_cache_valid        200 10s;
        proxy_cache_valid        404  5s;
        proxy_cache_methods      GET HEAD;
        proxy_cache_lock         on;
        proxy_cache_lock_timeout 5s;
        # Stale Response ausliefern wenn Directus kurz hängt
        proxy_cache_use_stale    error timeout updating http_500 http_502 http_503;

        # GET: Rate-Limit pro Token (großzügig)
        # POST: Rate-Limit pro IP (streng)
        limit_req zone=api_read  burst=100 delay=50;

        proxy_pass http://directus:8055;
    }

    # Alle anderen (Admin, GraphQL, Assets)
    location / {
        proxy_pass http://directus:8055;
    }
}
