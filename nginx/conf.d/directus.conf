# Rate-Limit-Zonen (pro IP)
# api_read: 120 Requests/min — Widget-Lesezugriffe, kurze Bursts erlaubt
# api_write: 10 Requests/min — Vote-Submits, streng
# api_auth: 5 Requests/min — Login-Schutz gegen Brute-Force
limit_req_zone $binary_remote_addr zone=api_read:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=api_write:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;

# CORS: dynamische Origin-Validierung für rnd.de und Subdomains
map $http_origin $cors_origin {
    default "";
    "~^https://(www\.)?rnd\.de$"    $http_origin;
    "~^https://[^/]+\.rnd\.de$"     $http_origin;
}

server {
    listen 80;
    server_name _;

    # Sicherheits-Header
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP: erlaubt iFrame-Einbettung nur von rnd.de
    add_header Content-Security-Policy "frame-ancestors 'self' https://rnd.de https://*.rnd.de" always;

    # CORS
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

    # Technologie-Stack nicht verraten
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # Gemeinsame Proxy-Einstellungen
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;

    # Auth-Endpunkte: strenges Rate-Limiting gegen Brute-Force
    location ~ ^/auth/ {
        limit_req zone=api_auth burst=3 nodelay;
        proxy_pass http://directus:8055;
    }

    # Items-Endpunkte: Read-Rate-Limiting (Write-Limit via api_write-Zone in separatem Block)
    location ~ ^/items/[^/]+$ {
        limit_req zone=api_read burst=40 delay=20;

        # OPTIONS preflight mit expliziten CORS-Headern
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://directus:8055;
    }

    # Alle anderen Anfragen (Admin, GraphQL, Assets)
    location / {
        # OPTIONS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass http://directus:8055;
    }
}
